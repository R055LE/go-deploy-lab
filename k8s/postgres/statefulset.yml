apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: go-deploy-lab
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17.4-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: configstore
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: changeme  # local dev only — use Secrets in real deployments
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi

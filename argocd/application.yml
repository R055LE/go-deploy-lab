apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-deploy-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/R055LE/go-deploy-lab.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: go-deploy-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
